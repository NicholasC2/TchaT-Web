<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
        <title>TchaT</title>
    </head>
    <body>
        <script>
            async function generateKeyPair() {
                const keyPair = await crypto.subtle.generateKey(
                    {
                        name: "RSASSA-PKCS1-v1_5", // signing algorithm
                        modulusLength: 2048,        // key size
                        publicExponent: new Uint8Array([1, 0, 1]), // 65537
                        hash: "SHA-256",            // hash for signing
                    },
                    true, // extractable
                    ["sign", "verify"]
                );

                const publicKey = await crypto.subtle.exportKey("spki", keyPair.publicKey);
                const privateKey = await crypto.subtle.exportKey("pkcs8", keyPair.privateKey);

                // convert to base64 strings
                const pubB64 = arrayBufferToBase64(publicKey);
                const privB64 = arrayBufferToBase64(privateKey);

                return { publicKey: pubB64, privateKey: privB64 };
            }

            // helper
            function arrayBufferToBase64(buffer) {
                let binary = '';
                const bytes = new Uint8Array(buffer);
                for (let b of bytes) binary += String.fromCharCode(b);
                return btoa(binary);
            }

            async function signChallenge(privateKeyB64, challengeB64) {
                // convert base64 to ArrayBuffer
                const privBytes = Uint8Array.from(atob(privateKeyB64), c => c.charCodeAt(0));
                const privKey = await crypto.subtle.importKey(
                    "pkcs8",
                    privBytes.buffer,
                    { name: "RSASSA-PKCS1-v1_5", hash: "SHA-256" },
                    false,
                    ["sign"]
                );

                const challengeBytes = Uint8Array.from(atob(challengeB64), c => c.charCodeAt(0));

                const signature = await crypto.subtle.sign("RSASSA-PKCS1-v1_5", privKey, challengeBytes);
                return btoa(String.fromCharCode(...new Uint8Array(signature)));
            }

            const IP = "http://localhost:8000";
            const socket = io(IP);

            let TchaTServerCheck = false;

            socket.on("message", (msg) => {
                if (msg["is-tchat-server"]) {
                    TchaTServerCheck = true;
                }
            });

            (async function() {
                if (!(await checkIP())) {
                    alert("Invalid IP!");
                    socket.close();
                    socket.destroy();
                }

                const keys = await generateKeyPair();

                socket.emit("message", {type: "account/create", data: {
                    username: "nick",
                    displayName: "NicholasC",
                    pubKey: keys.publicKey.toString()
                }})

                socket.on("message", async(event) => {
                    if(event.type == "account/creationSuccessful") {
                        socket.emit("message", {type: "account/login", data: {
                            username: "nick"
                        }})
                    }

                    if(event.type == "account/challengeSend") {
                        const signature = await signChallenge(keys.privateKey, event.data.value);
                        socket.emit("message", {type: "account/challengeRecieve", data: {
                            signature: signature,
                            username: "nick"
                        }})
                    }
                })
            })();

            async function checkIP() {
                return new Promise((resolve) => {
                    TchaTServerCheck = false;
                    let countdown = 10000;

                    const interval = setInterval(() => {
                        if (TchaTServerCheck) {
                            clearInterval(interval);
                            resolve(true);
                        }

                        countdown -= 500;

                        if (countdown <= 0) {
                            clearInterval(interval);
                            resolve(TchaTServerCheck);
                        }
                    }, 500);
                });
            }
        </script>
    </body>
</html>
